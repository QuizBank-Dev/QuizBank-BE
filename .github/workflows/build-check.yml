name: Build Check

on:
    pull_request:
        branches:
            - develop # develop 브랜치에 PR이 생성될 때 실행

jobs:
    build:
        runs-on: ubuntu-latest

        env:
            ACCESS_TOKEN_SECRET: dummy
            REFRESH_TOKEN_SECRET: dummy
            DB_DEFAULT_URI: dummy
            DB_SUB_URI: dummy

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v3

            - name: Setup Node.js and pnpm
              uses: actions/setup-node@v3
              with:
                  node-version: 18 # ✅ 프로젝트에 맞는 Node.js 버전 사용
                  cache: 'pnpm' # ✅ pnpm 캐싱 활성화

            - name: Install pnpm
              run: npm install -g pnpm

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile # ✅ lockfile 기반 설치 (더 빠르고 안전함)

            - name: Run Build
              run: pnpm run build
