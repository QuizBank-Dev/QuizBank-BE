name: Build Check

on:
    pull_request:
        branches:
            - develop # develop 브랜치에 PR이 생성될 때 실행

jobs:
    build:
        runs-on: ubuntu-latest

        env:
            ACCESS_TOKEN_SECRET: dummy
            REFRESH_TOKEN_SECRET: dummy
            DB_DEFAULT_URI: dummy
            DB_SUB_URI: dummy

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              name: Install pnpm
              with:
                  version: 10
                  run_install: false

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20 # ✅ Node.js 버전 지정
                  cache: 'pnpm' # ✅ pnpm 캐싱 활성화

            - name: Install pnpm
              run: npm install -g pnpm # ✅ pnpm을 명확하게 설치

            - name: Verify pnpm Installation
              run: pnpm --version # ✅ pnpm이 정상적으로 설치되었는지 확인

            - name: Install Dependencies
              run: pnpm install # ✅ lockfile 기반 설치 (더 빠르고 안전함)

            - name: Run Build
              run: pnpm build
